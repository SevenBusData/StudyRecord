server:
  port: 8080

spring:
  application:
    name: blog-backend

  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:init.sql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    property-naming-strategy: SNAKE_CASE

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      ddl-auto: update

jwt:
  secret: your_very_long_jwt_secret_key_that_is_at_least_32_bytes_long
  expiration: 86400000
  refresh-expiration: 604800000

swagger:
  enabled: true
  title: Blog System API
  description: Blog System API Documentation
  version: 1.0.0
  base-package: com.blog.controller
  contact:
    name: Author
    email: contact@example.com

logging:
  level:
    org.springframework: DEBUG
    com.blog: DEBUG
